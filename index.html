<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog.exe</title>
  <style>
    :root{
      --bg: #070a07;
      --panel: #0b120b;
      --text: #b7ffb7;
      --muted: #7ddf7d;
      --hot: #00ff66;
      --warn: #ffcc66;
      --border: rgba(183,255,183,.18);
      --shadow: rgba(0,255,102,.12);
      --scan: rgba(255,255,255,.04);
      --glow: 0 0 14px rgba(0,255,102,.25);
      --font: "Courier New", Courier, monospace;
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      background: radial-gradient(1200px 700px at 30% 10%, rgba(0,255,102,.10), transparent 55%),
                  radial-gradient(900px 600px at 70% 80%, rgba(0,255,102,.08), transparent 55%),
                  var(--bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: .2px;
    }

    /* CRT overlay */
    .crt::before{
      content:"";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 2px,
          var(--scan) 3px
        );
      mix-blend-mode: overlay;
      opacity: .75;
      z-index: 50;
    }
    .crt::after{
      content:"";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,.35) 70%, rgba(0,0,0,.65) 100%);
      z-index: 51;
    }

    header{
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(7,10,7,.92), rgba(7,10,7,.72));
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    .topbar{
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .brand{
      display:flex;
      gap: 10px;
      align-items: baseline;
      text-shadow: var(--glow);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand .logo{
      color: var(--hot);
      font-weight: 700;
    }
    .brand .hint{
      color: var(--muted);
      font-size: 12px;
    }

    .controls{
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap: wrap;
    }

    .input, .select, .btn{
      border: 1px solid var(--border);
      background: rgba(11,18,11,.65);
      color: var(--text);
      padding: 8px 10px;
      font-family: var(--font);
      outline: none;
      box-shadow: 0 0 0 2px transparent;
    }
    .input:focus, .select:focus, .btn:focus{
      box-shadow: 0 0 0 2px rgba(0,255,102,.18);
    }
    .input{
      width: min(360px, 60vw);
    }
    .btn{
      cursor:pointer;
      text-shadow: var(--glow);
    }
    .btn:hover{
      border-color: rgba(0,255,102,.35);
      box-shadow: 0 0 18px var(--shadow);
    }
    .btn:active{
      transform: translateY(1px);
    }

    main .grid{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    @media (max-width: 900px){
      main .grid{ grid-template-columns: 1fr; }
    }

    .panel{
      border: 1px solid var(--border);
      background: rgba(11,18,11,.55);
      box-shadow: 0 0 22px rgba(0,255,102,.06);
    }

    .panel .titlebar{
      display:flex;
      align-items:center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, rgba(0,255,102,.08), rgba(0,0,0,0));
      font-size: 13px;
    }

    .titlebar .dots{
      display:flex;
      gap: 6px;
      opacity:.8;
    }
    .dot{
      width: 10px;
      height: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.25);
    }

    .list{
      padding: 6px;
      max-height: 70vh;
      overflow:auto;
    }

    .item{
      display:block;
      width:100%;
      text-align:left;
      padding: 10px 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      cursor:pointer;
    }
    .item:hover{
      border-color: rgba(0,255,102,.22);
      background: rgba(0,255,102,.04);
    }
    .item.active{
      border-color: rgba(0,255,102,.40);
      background: rgba(0,255,102,.07);
      box-shadow: inset 0 0 0 1px rgba(0,255,102,.10);
    }

    .item .meta{
      display:flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .tags{
      display:flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag{
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(0,0,0,.18);
    }

    article{
      padding: 14px 14px 18px;
    }
    article h1{
      margin: 0 0 6px;
      font-size: 18px;
      color: var(--hot);
      text-shadow: var(--glow);
      letter-spacing: .6px;
    }
    article .sub{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .hr{
      border-top: 1px dashed rgba(183,255,183,.25);
      margin: 12px 0;
    }

    pre{
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      font-size: 14px;
    }

    .status{
      margin-top: 14px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      display:flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .blink{
      animation: blink 1s steps(1) infinite;
      display:inline-block;
      width: 10px;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    a{ color: var(--warn); text-decoration: none; }
    a:hover{ text-decoration: underline; }

    /* optional tiny flicker */
    @media (prefers-reduced-motion: no-preference){
      .flicker{
        animation: flicker 5.5s infinite;
      }
      @keyframes flicker{
        0%, 100% { opacity: 1; }
        30% { opacity: .98; }
        31% { opacity: 1; }
        60% { opacity: .99; }
        61% { opacity: 1; }
      }
    }

    /* PROFILE PANEL */
    .profile{
      display: flex;
      gap: 16px;
      padding: 14px;
      align-items: center;
    }
    .avatar{
      width: 96px;
      height: 96px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: #000;
      image-rendering: pixelated;
      box-shadow: 0 0 14px rgba(0,255,102,.15);
    }
    .profile-text{
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .profile-text .name{
      color: var(--hot);
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: var(--glow);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-text .tagline{
      font-size: 12px;
      color: var(--muted);
    }
    .socials{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .socials a{
      font-size: 12px;
      padding: 3px 6px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.25);
      color: var(--warn);
    }
    .socials a:hover{
      border-color: rgba(0,255,102,.4);
      box-shadow: 0 0 10px rgba(0,255,102,.2);
      text-decoration: none;
    }
  </style>
</head>

<body class="crt">
  <header>
    <div class="wrap topbar">
      <div class="brand">
      </div>

      <div class="controls">
      </div>
    </div>
  </header>

  <main class="wrap flicker">


  </main>
</body>
</html>
